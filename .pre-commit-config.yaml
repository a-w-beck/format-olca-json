repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
    - id: check-json  # -toml, -yaml
    
  - repo: https://github.com/a-w-beck/format-olca-json.git
    rev: v0.1.0
    hooks:
    - id: format-olca-json
      stages: [pre-commit, manual]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
    - id: end-of-file-fixer
    - id: trailing-whitespace

